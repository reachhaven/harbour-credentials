id: https://w3id.org/reachhaven/harbour/gx/v1
name: harbour-gx-credential
description: >
  Gaia-X domain layer for Harbour credentials.
  Defines participant types via inheritance from gx: base classes and
  compliance-verified credential types for the Gaia-X flow.
  harbour:LegalPerson extends gx:LegalPerson (inherits registrationNumber,
  legalAddress, headquartersAddress) and adds SHACL-enforced compliance
  slots that require references to all three Gaia-X participant VCs.
  harbour:NaturalPerson extends gx:Participant directly — Gaia-X has
  no NaturalPerson, so Harbour defines one as a sibling of gx:LegalPerson.
  Key design: LegalPersonCredential IS the compliance credential —
  holding a valid one means Haven verified the three underlying Gaia-X
  VCs (LegalPerson, VatID, Issuer/T&C). The input VCs are plain Gaia-X
  (no harbour envelope); harbour only wraps the compliance output.

# ============================================================================
# SPECIFICATION REFERENCES
# ============================================================================
# [VCDM2]        W3C Verifiable Credentials Data Model v2.0
#                https://www.w3.org/TR/vc-data-model-2.0/
#                Local: docs/specs/references/vc-data-model-2.0.md
# [SD-JWT-VC]    SD-JWT-based Verifiable Credentials (draft-15)
#                https://datatracker.ietf.org/doc/draft-ietf-oauth-sd-jwt-vc/
#                Local: docs/specs/references/sd-jwt-vc.md
# [GX-AD]        Gaia-X Architecture Document 25.11
#                https://docs.gaia-x.eu/technical-committee/architecture-document/25.11/
#                Local: docs/specs/references/gx-architecture-document-25.11.md
# [GX-CD]        Gaia-X Compliance Document 25.10 (Loire)
#                https://docs.gaia-x.eu/policy-rules-committee/compliance-document/25.10/
#                Local: docs/specs/references/gx-compliance-document-25.10.md
# [GX-CD-PA]     Gaia-X Compliance Document 25.10 — §5 Participant Criteria
#                https://docs.gaia-x.eu/policy-rules-committee/compliance-document/25.10/criteria_participant/
#                Local: docs/specs/references/gx-compliance-document-25.10.md §5
# [GX-CD-TA]     Gaia-X Compliance Document 25.10 — §8 Trust Anchors
#                https://docs.gaia-x.eu/policy-rules-committee/compliance-document/25.10/Gaia-X_Trust_Anchors/
#                Local: docs/specs/references/gx-compliance-document-25.10.md §8
# [GX-CD-PROC]   Gaia-X Compliance Document 25.10 — §12 Process
#                https://docs.gaia-x.eu/policy-rules-committee/compliance-document/25.10/Process/
#                Local: docs/specs/references/gx-compliance-document-25.10.md §12
# [GX-CD-LABEL]  Gaia-X Compliance Document 25.10 — §10 Label Format
#                https://docs.gaia-x.eu/policy-rules-committee/compliance-document/latest/annex_label_format/
#                Local: docs/specs/references/gx-compliance-document-25.10.md §10
# [GX-SHACL]     Gaia-X SHACL Shapes
#                Namespace: https://w3id.org/gaia-x/development#
#                Local: submodules/ontology-management-base/artifacts/gx/gx.shacl.ttl
# [GX-ONT-LP]    Gaia-X Ontology — LegalPerson
#                https://docs.gaia-x.eu/ontology/development/classes/LegalPerson/
#                Local: docs/specs/references/gx-compliance-document-25.10.md §5 (ontology links)
# [GX-ONT-PA]    Gaia-X Ontology — Participant (abstract)
#                https://docs.gaia-x.eu/ontology/development/classes/Participant/
#                Local: docs/specs/references/gx-compliance-document-25.10.md §5 (ontology links)
# [SCHEMA-ORG]   schema.org vocabulary
#                https://schema.org/
# [SRI]          W3C Subresource Integrity
#                https://www.w3.org/TR/SRI/
#
# DESIGN DECISIONS
# ============================================================================
# Inheritance over composition: Harbour participant types extend gx: base
# classes directly via is_a, placing them in the gx type hierarchy:
#
#   gx:Participant (abstract)
#     ├─ gx:LegalPerson  (entity data — used in plain gx input VCs)
#     └─ harbour:NaturalPerson (is_a: Participant)
#
#   harbour:LegalPerson — pure compliance attestation type
#     (no gx inheritance — entity data in referenced gx:LegalPerson VC)
#
#   HarbourCredential (abstract)
#     └─ ComplianceCredential (abstract — marker for compliance-verified)
#          └─ LegalPersonCredential (= compliance credential for orgs)
#
# LegalPersonCredential IS the compliance credential: holding a valid one
# means Haven has verified all three Gaia-X VCs (LegalPerson, VatID,
# Issuer/T&C). The input VCs are plain Gaia-X (VerifiableCredential
# only, no harbour envelope type).
#
# harbour:LegalPerson adds compliance enforcement slots
# (compliantLegalPersonVC, compliantRegistrationVC, compliantTermsVC)
# with SHACL sh:minCount 1 — guaranteeing all three Gaia-X VCs are
# present. This is machine-readable enforcement that the Gaia-X Loire
# specification is missing.
#
# Harbour SHACL is generated with exclude_imports=True to avoid
# duplicating gx shapes. gx shapes are validated separately.
# ============================================================================

prefixes:
  linkml: https://w3id.org/linkml/
  harbour: https://w3id.org/reachhaven/harbour/core/v1/
  harbour.gx: https://w3id.org/reachhaven/harbour/gx/v1/
  sdo: http://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  cred: https://www.w3.org/2018/credentials#
  gx: https://w3id.org/gaia-x/development#

default_prefix: harbour.gx
default_range: string

imports:
  - linkml:types
  - ./harbour-core-credential
  - gaia-x

# ==========================================
# Composition Slot (used by simpulseid layer)
# ==========================================
# The participant slot allows simpulseid credential subjects to
# reference a harbour participant (LegalPerson or NaturalPerson)
# as a nested node. Typed as gx:Participant — the abstract base
# for all participant types in the gx hierarchy.

slots:
  # [GX-ONT-PA] — gx:Participant is the abstract base for all
  #   participant types in the Gaia-X hierarchy.
  participant:
    description: >
      Reference to a Gaia-X participant node (harbour:LegalPerson or
      harbour:NaturalPerson). Used by downstream credential layers
      (e.g. simpulseid) to embed participant data in credential subjects.
    slot_uri: harbour.gx:participant
    range: Participant
    required: false


classes:
  # ==========================================
  # 1. CREDENTIAL TYPES
  # ==========================================
  # Credential types for the harbour Gaia-X compliance flow.
  # [VCDM2] §4 — each credential MUST have @context, type, issuer,
  #   credentialSubject. Harbour profile additionally requires validFrom
  #   and credentialStatus (inherited from HarbourCredential).
  #
  # Architecture: LegalPersonCredential IS the compliance credential.
  # Holding a valid one means Haven has verified all three required
  # Gaia-X VCs (LegalPerson, VatID, Issuer/T&C). The input VCs are
  # plain Gaia-X (VerifiableCredential only, no harbour envelope type).
  # The SHACL shape for harbour.gx:LegalPerson enforces the presence
  # of all three VC references — machine-readable enforcement that
  # the Gaia-X Loire specification is missing.

  # ------------------------------------------
  # 1a. ABSTRACT COMPLIANCE BASE
  # ------------------------------------------
  # [GX-CD-PA] §5.1 Criterion PA1.1 — participant must provide
  #   gx:Participant + gx:LegalPerson + gx:Issuer (T&C) information.
  # [GX-CD-PROC] §12 — compliance VP verified by GXDCH, compliance
  #   credential issued on success.
  # ComplianceCredential is an abstract marker: subclasses represent
  # credentials where Haven has verified underlying Gaia-X VCs.

  ComplianceCredential:
    is_a: HarbourCredential
    abstract: true
    description: >
      Abstract base class for compliance-verified credential types.
      Subclasses represent credentials where Haven (compliance service)
      has verified the underlying Gaia-X participant VCs per
      [GX-CD-PA] §5.1 Criterion PA1.1. A valid ComplianceCredential
      proves Gaia-X compliance — the credentialSubject type enforces
      (via SHACL) that all required Gaia-X VC references are present.
    class_uri: harbour.gx:ComplianceCredential

  # ------------------------------------------
  # 1b. CONCRETE CREDENTIAL TYPES
  # ------------------------------------------

  # [GX-CD-PA] §5.1 Criterion PA1.1 — three VCs required for compliance.
  # [GX-CD-PROC] §12 — compliance VP submitted to GXDCH, credential
  #   issued on success.
  # [GX-CD-LABEL] §10 — label levels (SC, L1, L2, L3) attach to this
  #   credential type.
  LegalPersonCredential:
    is_a: ComplianceCredential
    description: >
      Credential attesting to a harbour.gx:LegalPerson (organization) identity
      AND its Gaia-X compliance status. Issued by Haven (compliance service)
      after verifying the three required Gaia-X VCs per [GX-CD-PA] §5.1:
        (1) gx:LegalPerson — self-signed entity identity [GX-ONT-LP]
        (2) gx:VatID — notary-verified registration number [GX-CD-TA] §8
        (3) gx:Issuer — self-signed T&C acceptance [GX-CD-PA] §5.1
      The credentialSubject is a harbour.gx:LegalPerson which carries
      compliance enforcement slots (compliantLegalPersonVC,
      compliantRegistrationVC, compliantTermsVC) — each enforced by
      SHACL sh:minCount 1.
      Holding a valid LegalPersonCredential = Gaia-X compliant.
      See [GX-CD-PROC] §12 for the issuance process.
    class_uri: harbour.gx:LegalPersonCredential
    annotations:
      # [SD-JWT-VC] §3.2.2.1 — vct MUST be a case-sensitive StringOrURI
      #   identifying the credential type.
      vct: "https://w3id.org/reachhaven/harbour/gx/v1/LegalPersonCredential"
    slot_usage:
      validFrom:
        required: true
      evidence:
        required: true

  # [GX-ONT-PA] — gx:Participant is the abstract base; Gaia-X defines
  #   no NaturalPerson type, so this credential type is a Harbour extension.
  # [VCDM2] §4 — standard VC envelope requirements apply.
  NaturalPersonCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a harbour.gx:NaturalPerson (individual) identity.
      The credentialSubject is a harbour.gx:NaturalPerson which extends
      gx:Participant [GX-ONT-PA] directly — Gaia-X defines no NaturalPerson,
      so Harbour creates one as a sibling of gx:LegalPerson [GX-ONT-LP].
      Inherits name/description from gx:Participant and adds person-specific
      attributes (givenName, familyName, address, email) from [SCHEMA-ORG].
    class_uri: harbour.gx:NaturalPersonCredential
    annotations:
      # [SD-JWT-VC] §3.2.2.1 — vct MUST be a case-sensitive StringOrURI.
      vct: "https://w3id.org/reachhaven/harbour/gx/v1/NaturalPersonCredential"
    slot_usage:
      validFrom:
        required: true
      evidence:
        required: true


  # ==========================================
  # 2. CREDENTIAL SUBJECT TYPES
  # ==========================================
  # harbour.gx:LegalPerson — pure compliance attestation type. Does NOT
  #   extend gx:LegalPerson [GX-ONT-LP] (to avoid gx:LegalPersonShape
  #   sh:closed true violations [GX-SHACL]). Entity data lives in the
  #   referenced plain gx:LegalPerson input VC. This type only carries
  #   compliance enforcement slots (VC refs + metadata per [GX-CD-LABEL] §10).
  # harbour.gx:NaturalPerson — extends gx:Participant [GX-ONT-PA]. Gaia-X has
  #   no NaturalPerson, so Harbour creates one as a sibling of gx:LegalPerson.

  # ------------------------------------------
  # 2a. LEGAL PERSON (compliance attestation)
  # ------------------------------------------
  # [GX-CD-PA] §5.1 Criterion PA1.1 — three VCs required for compliance.
  # [GX-SHACL] gx:LegalPersonShape uses sh:closed true; harbour.gx:LegalPerson
  #   is a separate type to avoid violating gx closed shapes.
  # [GX-CD-LABEL] §10 — label metadata (labelLevel, engineVersion, etc.)
  #   attaches to this subject type.

  HarbourLegalPerson:
    description: >
      Compliance attestation for a legal person (organization) in the
      harbour ecosystem. A pure compliance type — does NOT contain entity
      data (name, addresses, registrationNumber). Entity data lives in
      the referenced gx:LegalPerson input VC [GX-ONT-LP].
      SHACL-enforced compliance slots require references to all three
      Gaia-X participant VCs per [GX-CD-PA] §5.1 PA1.1 (LegalPerson,
      VatID, Issuer/T&C) with integrity hashes [SRI]. This is the key
      harbour value-add over raw Gaia-X: machine-readable enforcement
      that the Loire specification is missing.
    class_uri: harbour.gx:LegalPerson
    attributes:
      # [GX-ONT-LP] — references the self-signed gx:LegalPerson VC
      #   containing registrationNumber, legalAddress, headquartersAddress.
      compliantLegalPersonVC:
        description: >
          Reference to the verified gx:LegalPerson self-description
          credential with integrity hash [SRI]. The referenced VC
          contains entity data per [GX-ONT-LP]: registrationNumber (≥1),
          legalAddress (=1), headquartersAddress (=1).
        slot_uri: harbour.gx:compliantLegalPersonVC
        range: CompliantCredentialReference
        required: true
        inlined: true
      # [GX-CD-TA] §8.3 — registration number VC signed by accredited
      #   Gaia-X Notary after verification against Trusted Data Sources
      #   (VIES for vatID, GLEIF for leiCode, OpenCorporate for local).
      compliantRegistrationVC:
        description: >
          Reference to the verified gx:VatID (or other registration
          number) credential with integrity hash [SRI]. The referenced
          VC is notary-signed per [GX-CD-TA] §8.3, verified against
          accredited Trusted Data Sources (VIES, GLEIF, etc.).
        slot_uri: harbour.gx:compliantRegistrationVC
        range: CompliantCredentialReference
        required: true
        inlined: true
      # [GX-CD-PA] §5.1 — T&C acceptance is mandatory for PA1.1.
      #   The referenced VC contains gx:gaiaxTermsAndConditions (SHA-256
      #   hash of the T&C text).
      compliantTermsVC:
        description: >
          Reference to the verified gx:Issuer (T&C acceptance)
          credential with integrity hash [SRI]. The referenced VC is
          self-signed and contains gx:gaiaxTermsAndConditions per
          [GX-CD-PA] §5.1 — a SHA-256 hash of the Gaia-X T&C text.
        slot_uri: harbour.gx:compliantTermsVC
        range: CompliantCredentialReference
        required: true
        inlined: true
      # [GX-CD] §3.1 — label levels: SC (Standard Compliance), L1, L2, L3.
      # [GX-CD-LABEL] §10 — label is a machine-readable VC containing
      #   conformity assessment scheme level.
      labelLevel:
        description: >
          Gaia-X conformity label level per [GX-CD] §3.1.
          Valid values: SC (Standard Compliance), L1, L2, L3.
          See [GX-CD-LABEL] §10 for machine-readable label format.
        slot_uri: harbour.gx:labelLevel
        range: string
        required: true
      # [GX-CD-LABEL] §10 — Compliance Service version (software version
      #   of the GXDCH instance that performed validation).
      engineVersion:
        description: >
          Version of the Gaia-X compliance engine (GXDCH instance)
          that performed the validation. See [GX-CD-LABEL] §10.
        slot_uri: harbour.gx:engineVersion
        range: string
        required: true
      # [GX-CD-LABEL] §10 — Reference to the assessment scheme version
      #   (e.g. "CD25.10" for Loire).
      rulesVersion:
        description: >
          Version of the Gaia-X compliance document from which the
          validated criteria originate (e.g. "CD25.10" for Loire).
          See [GX-CD-LABEL] §10.
        slot_uri: harbour.gx:rulesVersion
        range: string
        required: true
      # [GX-CD-PA] §5.1 — list of criteria validated (e.g. PA1.1).
      validatedCriteria:
        description: >
          List of Gaia-X compliance criteria URIs validated by the
          compliance engine. Typically includes PA1.1 per [GX-CD-PA]
          §5.1 for participant compliance.
        slot_uri: harbour.gx:validatedCriteria
        range: string
        multivalued: true
        required: true

  # ------------------------------------------
  # 2b. COMPLIANT CREDENTIAL REFERENCE
  # ------------------------------------------
  # [GX-CD-LABEL] §10 — label format includes references to assessed
  #   credentials. CompliantCredentialReference mirrors the
  #   gx:CompliantCredential pattern from the compliance spec.
  # [SRI] — Subresource Integrity hash ensures referenced credential
  #   integrity without requiring re-download.

  CompliantCredentialReference:
    description: >
      Reference to a credential validated by the compliance engine.
      Includes the credential type and a subresource integrity hash
      [SRI] to ensure the referenced credential has not been modified.
      Mirrors the gx:CompliantCredential pattern from [GX-CD-LABEL] §10.
      Optionally embeds the full credential for self-contained
      verification (no external resolution needed).
    class_uri: harbour.gx:CompliantCredentialReference
    attributes:
      # [GX-CD-LABEL] §10 — identifies which gx type was assessed
      #   (e.g. gx:LegalPerson, gx:VatID, gx:Issuer).
      credentialType:
        description: >
          Type of the compliant credential per [GX-CD-LABEL] §10,
          e.g. "gx:LegalPerson", "gx:VatID", "gx:Issuer".
        slot_uri: harbour.gx:credentialType
        range: string
        required: true
      # [SRI] W3C Subresource Integrity — format: "sha256-{hex_digest}".
      #   https://www.w3.org/TR/SRI/
      digestSRI:
        description: >
          Subresource Integrity [SRI] hash of the verifiable credential.
          Format: "sha256-{hex_digest}".
          See https://www.w3.org/TR/SRI/
        slot_uri: harbour.gx:digestSRI
        range: string
        required: true
      embeddedCredential:
        description: >
          Optional embedded verifiable credential. When present, the
          full credential is included inline for self-contained
          verification. When absent, the credential must be resolved
          externally (e.g. via the participant VP or a credential
          registry). The digestSRI [SRI] still serves as integrity
          proof in both cases.
          Named 'embeddedCredential' (not 'verifiableCredential') to
          avoid JSON-LD term collision with cred:verifiableCredential
          from the W3C VC context [VCDM2].
        slot_uri: harbour.gx:embeddedCredential
        range: string
        required: false
        inlined: true

  # ------------------------------------------
  # 2c. NATURAL PERSON (harbour extension)
  # ------------------------------------------
  # [GX-ONT-PA] — gx:Participant is the abstract base; Gaia-X defines
  #   no NaturalPerson type, so Harbour creates one as a sibling of
  #   gx:LegalPerson [GX-ONT-LP] under gx:Participant.
  # [SCHEMA-ORG] — person-specific attributes (givenName, familyName,
  #   memberOf, email) use http://schema.org/ vocabulary.

  HarbourNaturalPerson:
    is_a: Participant
    description: >
      A natural person (individual) in the harbour ecosystem.
      Extends gx:Participant [GX-ONT-PA] directly — Gaia-X defines no
      NaturalPerson type, so Harbour creates one as a sibling of
      gx:LegalPerson [GX-ONT-LP]. Inherits name, description from
      gx:Participant. Adds person-specific attributes from [SCHEMA-ORG]
      (givenName, familyName, email, memberOf) and gx:address.
    class_uri: harbour.gx:NaturalPerson
    slots:
      # [GX-ONT-PA] — gx:address (vcard:Address) from gx:Participant.
      - address
      # [SCHEMA-ORG] — http://schema.org/email
      - email
    slot_usage:
      email:
        slot_uri: sdo:email
      address:
        slot_uri: gx:address
    attributes:
      # [SCHEMA-ORG] — http://schema.org/givenName
      givenName:
        description: First name / given name of the natural person.
        slot_uri: sdo:givenName
        range: string
      # [SCHEMA-ORG] — http://schema.org/familyName
      familyName:
        description: Last name / family name of the natural person.
        slot_uri: sdo:familyName
        range: string
      # [SCHEMA-ORG] — http://schema.org/memberOf
      memberOf:
        description: Organization (LegalPerson) the natural person belongs to.
        slot_uri: sdo:memberOf
        range: uri
