id: https://w3id.org/reachhaven/harbour/gaiax-domain/v1
name: harbour-gx-credential
description: >
  Gaia-X domain layer for Harbour credentials.
  Defines participant types via inheritance from gx: base classes.
  harbour:LegalPerson extends gx:LegalPerson (inherits registrationNumber,
  legalAddress, headquartersAddress). harbour:NaturalPerson extends
  gx:Participant directly — Gaia-X has no NaturalPerson, so Harbour
  defines one as a sibling of gx:LegalPerson in the gx type hierarchy.

# ============================================================================
# SPECIFICATION REFERENCES
# ============================================================================
# [VCDM2]        W3C Verifiable Credentials Data Model v2.0
#                https://www.w3.org/TR/vc-data-model-2.0/
# [SD-JWT-VC]    SD-JWT-based Verifiable Credentials (draft-15)
#                https://datatracker.ietf.org/doc/draft-ietf-oauth-sd-jwt-vc/
# [GX-AD]        Gaia-X Architecture Document 25.11
#                https://docs.gaia-x.eu/technical-committee/architecture-document/25.11/
# [GX-SHACL]     Gaia-X SHACL Shapes (local: OMB artifacts/gx/gx.shacl.ttl)
#                Namespace: https://w3id.org/gaia-x/development#
# [SCHEMA-ORG]   schema.org vocabulary
#                https://schema.org/
#
# DESIGN DECISIONS
# ============================================================================
# Inheritance over composition: Harbour participant types extend gx: base
# classes directly via is_a, placing them in the gx type hierarchy:
#
#   gx:Participant (abstract)
#     ├─ gx:LegalPerson
#     │    └─ harbour:LegalPerson (is_a: LegalPerson)
#     └─ harbour:NaturalPerson (is_a: Participant)
#
# harbour:LegalPerson inherits registrationNumber, legalAddress,
# headquartersAddress from gx:LegalPerson.
# harbour:NaturalPerson inherits name, description from gx:Participant
# and adds person-specific attributes (givenName, familyName, address).
#
# Gaia-X has no NaturalPerson — Harbour defines one as a direct subclass
# of gx:Participant, parallel to gx:LegalPerson.
#
# Harbour SHACL is generated with exclude_imports=True to avoid
# duplicating gx shapes. gx shapes are validated separately.
# ============================================================================

prefixes:
  linkml: https://w3id.org/linkml/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  harbour_gx: https://w3id.org/reachhaven/harbour/gaiax-domain/v1/
  xsd: http://www.w3.org/2001/XMLSchema#
  cred: https://www.w3.org/2018/credentials#
  gx: https://w3id.org/gaia-x/development#

default_prefix: harbour_gx
default_range: string

imports:
  - linkml:types
  - ./harbour-core-credential
  - gaia-x

# ==========================================
# Composition Slot (used by simpulseid layer)
# ==========================================
# The gxParticipant slot allows simpulseid credential subjects to
# reference a harbour participant (LegalPerson or NaturalPerson)
# as a nested node. Typed as gx:Participant — the abstract base
# for all participant types in the gx hierarchy.

slots:
  gxParticipant:
    description: >
      Reference to a Gaia-X participant node (harbour:LegalPerson or
      harbour:NaturalPerson). Used by downstream credential layers
      (e.g. simpulseid) to embed participant data in credential subjects.
    slot_uri: harbour_gx:gxParticipant
    range: Participant
    required: false


classes:
  # ==========================================
  # 1. CREDENTIAL TYPES
  # ==========================================
  # Concrete credential types for harbour use case stories.
  # Defined in the domain layer because the credentialSubject types
  # (LegalPerson, NaturalPerson) carry domain-specific composition
  # slots (gxParticipant) that must be present in the SHACL closed shapes.
  # [VCDM2] §4 — each credential MUST have @context, type, issuer,
  #   credentialSubject. Harbour profile additionally requires validFrom
  #   and credentialStatus (inherited from HarbourCredential).

  LegalPersonCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a harbour:LegalPerson (organization) identity.
      The credentialSubject is a harbour:LegalPerson which extends
      gx:LegalPerson — inheriting registrationNumber, legalAddress,
      headquartersAddress directly.
    class_uri: harbour_gx:LegalPersonCredential
    annotations:
      # [SD-JWT-VC] §3.2.2.1 — vct MUST be a case-sensitive StringOrURI
      #   identifying the credential type.
      vct: "https://w3id.org/reachhaven/harbour/gaiax-domain/v1/LegalPersonCredential"
    slot_usage:
      validFrom:
        required: true
      evidence:
        required: true

  NaturalPersonCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a harbour:NaturalPerson (individual) identity.
      The credentialSubject is a harbour:NaturalPerson which extends
      gx:Participant directly — inheriting name/description and adding
      person-specific attributes (givenName, familyName, address, email).
    class_uri: harbour_gx:NaturalPersonCredential
    annotations:
      # [SD-JWT-VC] §3.2.2.1 — vct MUST be a case-sensitive StringOrURI.
      vct: "https://w3id.org/reachhaven/harbour/gaiax-domain/v1/NaturalPersonCredential"
    slot_usage:
      validFrom:
        required: true
      evidence:
        required: true

  # ==========================================
  # 2. PARTICIPANT TYPES
  # ==========================================
  # Harbour participant types extend gx: base classes directly.
  # harbour:LegalPerson is_a gx:LegalPerson — inherits all gx compliance
  # properties (registrationNumber, legalAddress, headquartersAddress).
  # harbour:NaturalPerson is_a gx:Participant — Gaia-X has no NaturalPerson,
  # so Harbour creates one as a sibling of gx:LegalPerson.

  HarbourLegalPerson:
    is_a: LegalPerson
    description: >
      A legal person (organization) in the harbour ecosystem.
      Extends gx:LegalPerson — inherits registrationNumber, legalAddress,
      headquartersAddress, name, description from the Gaia-X type hierarchy.
    class_uri: harbour_gx:LegalPerson

  HarbourNaturalPerson:
    is_a: Participant
    description: >
      A natural person (individual) in the harbour ecosystem.
      Extends gx:Participant directly — Gaia-X defines no NaturalPerson,
      so Harbour creates one as a sibling of gx:LegalPerson.
      Inherits name, description from gx:Participant. Adds person-specific
      attributes (givenName, familyName, address, email, memberOf).
    class_uri: harbour_gx:NaturalPerson
    slots:
      - address
      - email
    slot_usage:
      email:
        slot_uri: https://schema.org/email
      address:
        slot_uri: gx:address
    attributes:
      # [SCHEMA-ORG] — https://schema.org/givenName
      givenName:
        description: First name / given name of the natural person.
        slot_uri: https://schema.org/givenName
        range: string
      # [SCHEMA-ORG] — https://schema.org/familyName
      familyName:
        description: Last name / family name of the natural person.
        slot_uri: https://schema.org/familyName
        range: string
      # [SCHEMA-ORG] — https://schema.org/memberOf
      memberOf:
        description: Organization (LegalPerson) the natural person belongs to.
        slot_uri: https://schema.org/memberOf
        range: uri

