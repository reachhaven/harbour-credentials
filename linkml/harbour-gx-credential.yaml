id: https://w3id.org/reachhaven/harbour/gaiax-domain/v1
name: harbour-gx-credential
description: >
  Gaia-X domain layer for Harbour credentials.
  Defines participant types that wrap Gaia-X compliance data via
  composition. Harbour outer nodes carry harbour-specific properties;
  nested gx blank nodes carry only gx properties, keeping gx closed
  SHACL shapes intact.

# ============================================================================
# SPECIFICATION REFERENCES
# ============================================================================
# [VCDM2]        W3C Verifiable Credentials Data Model v2.0
#                https://www.w3.org/TR/vc-data-model-2.0/
# [SD-JWT-VC]    SD-JWT-based Verifiable Credentials (draft-15)
#                https://datatracker.ietf.org/doc/draft-ietf-oauth-sd-jwt-vc/
# [GX-AD]        Gaia-X Architecture Document 25.11
#                https://docs.gaia-x.eu/technical-committee/architecture-document/25.11/
# [GX-SHACL]     Gaia-X SHACL Shapes (local: OMB artifacts/gx/gx.shacl.ttl)
#                Namespace: https://w3id.org/gaia-x/development#
# [SCHEMA-ORG]   schema.org vocabulary
#                https://schema.org/
#
# DESIGN DECISIONS
# ============================================================================
# Composition over extension: Gaia-X Trust Framework defines closed SHACL
# shapes (sh:closed true) on gx: types. Adding ANY property to a gx: node
# violates the closed shape. Therefore Harbour uses composition — the
# harbour outer node owns harbour-specific properties, and a nested gx
# blank node carries only gx-valid properties.
# See: docs/specs/references/gx-architecture-document-25.11.md
#
# gxParticipant range is Any: The gx blank node content is validated by
# Gaia-X's own SHACL shapes (gx.shacl.ttl), not harbour's. Harbour SHACL
# is generated with exclude_imports=True to keep shapes separate.
# ============================================================================

prefixes:
  linkml: https://w3id.org/linkml/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  xsd: http://www.w3.org/2001/XMLSchema#
  cred: https://www.w3.org/2018/credentials#
  schema: http://schema.org/

default_prefix: harbour
default_range: string

imports:
  - linkml:types
  - ./harbour-core-credential

# ==========================================
# Composition Slots
# ==========================================
# [GX-AD] — Gaia-X Trust Framework 25.11 defines closed SHACL shapes on
#   gx:LegalPerson, gx:Participant. These shapes require specific properties
#   (registrationNumber, headquartersAddress, legalAddress).
# [GX-SHACL] — gx:LegalPersonShape has sh:closed true (see gx.shacl.ttl).
#   Adding properties to gx nodes violates the closed shape constraint.
#   Solution: composition — harbour outer node owns harbour properties;
#   nested gx blank node carries only gx properties.

slots:
  gxParticipant:
    description: >
      Nested Gaia-X participant compliance data
      (gx:LegalPerson or gx:Participant blank node).
    slot_uri: harbour:gxParticipant
    range: Any
    required: false


classes:
  # ==========================================
  # 1. CREDENTIAL TYPES
  # ==========================================
  # Concrete credential types for harbour use case stories.
  # Defined in the domain layer because the credentialSubject types
  # (LegalPerson, NaturalPerson) carry domain-specific composition
  # slots (gxParticipant) that must be present in the SHACL closed shapes.
  # [VCDM2] §4 — each credential MUST have @context, type, issuer,
  #   credentialSubject. Harbour profile additionally requires validFrom
  #   and credentialStatus (inherited from HarbourCredential).

  LegalPersonCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a harbour:LegalPerson (organization) identity.
      In skeleton form the credentialSubject carries only harbour properties
      (name). When Gaia-X compliance is needed, gxParticipant carries the
      gx:LegalPerson blank node with compliance data.
    class_uri: harbour:LegalPersonCredential
    annotations:
      # [SD-JWT-VC] §3.2.2.1 — vct MUST be a case-sensitive StringOrURI
      #   identifying the credential type.
      vct: "https://w3id.org/reachhaven/harbour/credentials/v1/LegalPersonCredential"
    slot_usage:
      validFrom:
        required: true
      evidence:
        required: true

  NaturalPersonCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a harbour:NaturalPerson (individual) identity.
      In skeleton form the credentialSubject carries only harbour properties
      (name, givenName, familyName, email, memberOf). When Gaia-X compliance
      is needed, gxParticipant carries the gx:Participant blank node.
    class_uri: harbour:NaturalPersonCredential
    annotations:
      # [SD-JWT-VC] §3.2.2.1 — vct MUST be a case-sensitive StringOrURI.
      vct: "https://w3id.org/reachhaven/harbour/credentials/v1/NaturalPersonCredential"
    slot_usage:
      validFrom:
        required: true
      evidence:
        required: true

  # ==========================================
  # 2. PARTICIPANT TYPES
  # ==========================================
  # Harbour wraps Gaia-X participant types via composition.
  # Gaia-X data lives in nested blank nodes (gxParticipant) to keep
  # gx closed shapes intact.
  # [GX-SHACL] — gx:LegalPersonShape (sh:closed true) requires:
  #   gx:registrationNumber (≥1), gx:legalAddress (=1),
  #   gx:headquartersAddress (=1). Optional: schema:name (≤1),
  #   schema:description (≤1), gx:parentOrganizationOf, gx:subOrganisationOf.

  LegalPerson:
    description: >
      A legal person (organization) participating in the harbour ecosystem.
      In skeleton form only the harbour name property is present. When Gaia-X
      compliance is needed, name is omitted from the outer node and schema:name
      lives in the gxParticipant inner node (gx:LegalPerson blank node),
      keeping the gx closed shape intact.
    class_uri: harbour:LegalPerson
    slots:
      - name
      - gxParticipant
    slot_usage:
      name:
        required: false

  NaturalPerson:
    description: >
      A natural person (individual) participating in the harbour ecosystem.
      In skeleton form only harbour properties are present. When Gaia-X
      compliance is needed, name is omitted and schema:name lives in the
      gxParticipant inner node (gx:Participant blank node).
    class_uri: harbour:NaturalPerson
    slots:
      - name
      - gxParticipant
    slot_usage:
      name:
        required: false
    attributes:
      # [SCHEMA-ORG] — https://schema.org/givenName
      givenName:
        slot_uri: schema:givenName
        range: string
      # [SCHEMA-ORG] — https://schema.org/familyName
      familyName:
        slot_uri: schema:familyName
        range: string
      # [SCHEMA-ORG] — https://schema.org/email
      email:
        slot_uri: schema:email
        range: string
      # [SCHEMA-ORG] — https://schema.org/memberOf
      memberOf:
        description: Organization (LegalPerson) the natural person belongs to.
        slot_uri: schema:memberOf
        range: uri

