id: https://w3id.org/reachhaven/harbour/credentials/v1
name: harbour
description: >
  Base LinkML schema for Harbour credentials.
  Defines the W3C VC envelope constraints (issuer, validFrom,
  credentialStatus), evidence types, revocation (CRSet), DID document
  structure, and trust anchor services. Domain-specific participant
  and credential types are defined in separate domain schemas
  (e.g. harbour-gx-credential.yaml).

# ============================================================================
# SPECIFICATION REFERENCES
# ============================================================================
# [VCDM2]        W3C Verifiable Credentials Data Model v2.0
#                https://www.w3.org/TR/vc-data-model-2.0/
# [DID-CORE]     W3C Decentralized Identifiers (DIDs) v1.0
#                https://www.w3.org/TR/did-core/
# [VC-JOSE-COSE] W3C Securing Verifiable Credentials using JOSE and COSE
#                https://www.w3.org/TR/vc-jose-cose/
# [SD-JWT]       RFC 9901: Selective Disclosure for JWTs
#                https://www.rfc-editor.org/rfc/rfc9901
# [SD-JWT-VC]    SD-JWT-based Verifiable Credentials (draft-15)
#                https://datatracker.ietf.org/doc/draft-ietf-oauth-sd-jwt-vc/
# [OID4VP]       OpenID for Verifiable Presentations 1.0 (Final)
#                https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
# [SCHEMA-ORG]   schema.org vocabulary
#                https://schema.org/
# [VC-CTX]       W3C VC v2 JSON-LD Context
#                https://www.w3.org/ns/credentials/v2
#
# LINKML DESIGN DECISIONS
# ============================================================================
# The w3c-vc.yaml shim is necessary because LinkML cannot import external
# OWL ontologies — see [LINKML-1950] (closed: wrapping is the pattern).
#   https://github.com/linkml/linkml/issues/1950
#
# Generator workarounds (in generate_artifacts.py):
# - cred:issuer nodeKind patched to sh:IRIOrLiteral because LinkML maps
#   range: string to sh:Literal, but [VC-CTX] defines issuer as @type: @id.
# - sh:class linkml:Any removed — see [LINKML-2914] (open).
#   https://github.com/linkml/linkml/issues/2914
# - Imported cred: terms excluded from JSON-LD context to avoid redefining
#   @protected terms already provided by [VC-CTX].
# - "type": "@type" manually injected — LinkML cannot emit this alias
#   without declaring a "type" slot that would conflict with [VC-CTX]'s
#   @protected definition of "type".
# ============================================================================

prefixes:
  linkml: https://w3id.org/linkml/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  sec: https://w3id.org/security#
  sdo: https://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  cs: https://www.w3.org/ns/credentials/status#
  cred: https://www.w3.org/2018/credentials#
  didcore: https://www.w3.org/ns/did#

default_prefix: harbour
default_range: string

imports:
  - linkml:types
  - ./w3c-vc

types:
  JsonLiteral:
    uri: rdf:JSON
    base: str
    description: >
      Structured JSON content serialized as an RDF JSON literal.

slots:
  # --- Identity Slots ---
  # [VCDM2] §4.4 — "id" is OPTIONAL on VC/VP/credentialSubject.
  #   If present, MUST be a URL (incl. DIDs, urn:uuid:).
  #   Maps to JSON-LD @id.
  # [DID-CORE] §3.1 — DID is a URI scheme (did:<method>:<method-specific-id>).
  id:
    description: The stable identifier for the entity (becomes @id in JSON-LD).
    identifier: true
    range: uri

  # DESIGN DECISION: "type" is intentionally NOT modeled as a slot.
  # [VCDM2] §4.5 — "type" MUST be present, maps to @type. Values MUST be
  #   terms or absolute URL strings resolvable via @context.
  # [VC-CTX] defines "type": "@type", which correctly maps JSON "type"
  #   to rdf:type IRIs. Declaring a LinkML slot with slot_uri: rdf:type would
  #   generate a JSON-LD context entry that overrides this W3C alias, turning
  #   type values into xsd:anyURI literals instead of IRIs.
  #   The "type": "@type" mapping is injected post-generation in
  #   generate_artifacts.py (see LINKML DESIGN DECISIONS above).

  # --- DID Document Slots ---
  # [DID-CORE] §4.2 — controller is a URI or set of URIs identifying the
  #   entity authorized to make changes to the DID document.
  #   In practice always a DID (did:ethr:..., did:key:..., etc.).
  controller:
    slot_uri: sec:controller
    range: Any

  # [DID-CORE JSON-LD] did/v1 expands authentication to the security vocabulary
  #   and represents values as IRI references to verification methods.
  authentication:
    slot_uri: sec:authenticationMethod
    range: Any

  # [DID-CORE JSON-LD] did/v1 expands assertionMethod to the security
  #   vocabulary and represents values as IRI references to verification methods.
  assertionMethod:
    slot_uri: sec:assertionMethod
    range: Any

  # [DID-CORE] §5.3.1 — publicKeyJwk carries verification method key material
  #   encoded as a JSON Web Key (RFC 7517). In JSON-LD it is represented as
  #   an rdf:JSON literal when the term is typed with @json.
  publicKeyJwk:
    slot_uri: sec:publicKeyJwk
    range: JsonLiteral

  # [DID-CORE] §5.4 — serviceEndpoint can be a URI, map, or set.
  #   Each service entry MUST have id, type, and serviceEndpoint.
  serviceEndpoint:
    slot_uri: didcore:serviceEndpoint
    range: Any
    required: true

  # --- Delegated Signing Evidence Slots ---
  # [OID4VP] §B.1.3.2.5 — Data Integrity proof.challenge = OID4VP nonce.
  # Harbour Delegation Spec §3 — challenge = "<nonce> HARBOUR_DELEGATE <hash>".
  challenge:
    description: >
      OID4VP-aligned challenge string binding the delegated transaction
      to a specific nonce and content hash.
    slot_uri: harbour:challenge
    range: string
    required: false

  # --- Revocation Registry (CRSet) Slots ---
  # [VCDM2] §4.10 — credentialStatus MUST have id and type; statusPurpose
  #   defined by BitstringStatusList. CRSet is the Harbour-specific mechanism.
  # [SD-JWT-VC] §3.2 — "status" claim MUST NOT be selectively disclosable.
  statusPurpose:
    slot_uri: cs:statusPurpose
    range: string
    required: false

  # Harbour-specific: endpoint IRI for the CRSet revocation registry.
  registryEndpoint:
    description: Service endpoint IRI for the CRSet.
    slot_uri: harbour:registryEndpoint
    range: uri
    required: false

  # Harbour-specific: smart contract URN for on-chain CRSet operations.
  contractURN:
    slot_uri: harbour:contractURN
    range: uri
    required: false

  # Harbour-specific: source repository for the CRSet implementation.
  sourceRepository:
    slot_uri: harbour:sourceRepository
    range: uri
    required: false

  # Harbour-specific: reference implementation for CRSet verification.
  implementation:
    slot_uri: harbour:implementation
    range: uri
    required: false

  # --- Trust Anchor / Organization Slots ---
  # NOTE: name, description, url, email, contactPoint are NOT defined here.
  # When the gaia-x import is active (harbour-gx-credential.yaml), gx
  # provides schema:name and schema:description as shared slots.
  # url, email, contactPoint use different gx URIs, so they are defined
  # as inline attributes on OrganizationEndpoint / ContactPoint below.
  contactType:
    slot_uri: sdo:contactType
    range: string

  # [VC-JOSE-COSE] §6.1 — media types: application/vp+jwt, application/vp+sd-jwt.
  #   Payload is the full VC JSON-LD as JWT claims set (§3.1).
  # [SD-JWT] RFC 9901 §4.3 — KB-JWT appended after disclosures.
  verifiablePresentation:
    description: >
      A Verifiable Presentation embedded as evidence. In examples this is
      shown as expanded JSON-LD for readability; on the wire it is encoded
      as a VC-JOSE-COSE compact JWS string (typ: vp+jwt) or SD-JWT VP.
    slot_uri: harbour:verifiablePresentation
    range: VerifiablePresentation
    required: false

  # --- Delegated Signature Evidence Slots ---
  # [OID4VP] §5.1 — transaction_data is request param (array of base64url JSON).
  # [OID4VP] §B.3.3 — KB-JWT carries transaction_data_hashes + _alg.
  # [OID4VP] §8.4 — Wallet MUST process each transaction_data object.
  # [CSC-DM] v1.0.0 — signatureRequest triggers OID4VP flow with transaction_data.
  # Harbour Delegation Spec §3 — transaction data object with type, credential_ids,
  #   nonce, iat, txn. Hash computed over canonical JSON (sorted keys, no whitespace).
  # NOTE: OID4VP hashes base64url transport string; Harbour hashes decoded canonical
  #   JSON. Both serve different layers (transport binding vs content integrity).
  transaction_data:
    description: >
      OID4VP-aligned transaction data object (§8.4). Contains action type,
      credential IDs, timestamps, and action-specific details in the txn field.
      On the receipt SD-JWT-VC this is a selectively disclosable claim enabling
      three-layer privacy (public / authorized / full audit).
    slot_uri: harbour:transaction_data
    range: Any
    required: false

  # [OID4VP] — conceptually maps to client_id → KB-JWT aud.
  # [SD-JWT] RFC 9901 §4.3 — KB-JWT aud claim identifies the intended verifier.
  delegatedTo:
    description: DID of the signing service executing on behalf of the user.
    slot_uri: harbour:delegatedTo
    range: uri
    required: false

classes:
  Any:
    class_uri: linkml:Any
    description: "Generic class for any type of value."

  # ==========================================
  # 1. ROOT DOCUMENT
  # ==========================================
  # [DID-CORE] §4 — DID Document is a set of data describing the DID subject.
  #   Properties: id (REQUIRED), controller, verificationMethod, service, etc.
  DIDDocument:
    class_uri: didcore:DIDDocument
    slots:
      - controller
    attributes:
      authentication:
        slot_uri: sec:authenticationMethod
        multivalued: true
        range: Any
      assertionMethod:
        slot_uri: sec:assertionMethod
        multivalued: true
        range: Any
      # [DID-CORE] §5.4 — service is OPTIONAL, each entry MUST have id, type,
      #   and serviceEndpoint. service values MUST be unique.
      service:
        slot_uri: didcore:service
        multivalued: true
        inlined: true
        range: Any
      # [DID-CORE] §5.3.1 — verificationMethod entries MUST have id, type,
      #   controller, and key material (publicKeyJwk or publicKeyMultibase).
      #   Harbour models a subset (id, controller, blockchainAccountId).
      verificationMethod:
        slot_uri: sec:verificationMethod
        multivalued: true
        range: Any

  # ==========================================
  # 2. SERVICES
  # ==========================================
  # [DID-CORE] §5.4 — services express ways of communicating with the DID
  #   subject. Each service MUST have id, type, serviceEndpoint.
  ServiceUnion:
    union_of:
      - TrustAnchorService
      - CRSetRevocationRegistryService
      - LinkedCredentialService

  # Harbour-specific: trust anchor endpoint exposing organization metadata.
  TrustAnchorService:
    class_uri: harbour:TrustAnchorService
    slots:
      - serviceEndpoint
    slot_usage:
      serviceEndpoint:
        range: OrganizationEndpoint
        inlined: true

  # Harbour-specific: linked credential endpoint for self-signed root credentials.
  # Analogous to a root CA certificate — the Trust Anchor's self-signed
  # LegalPersonCredential is publicly resolvable via this service endpoint.
  LinkedCredentialService:
    class_uri: harbour:LinkedCredentialService
    slots:
      - serviceEndpoint
    slot_usage:
      serviceEndpoint:
        range: Any
        description: >
          HTTPS URL where the self-signed credential (VC-JOSE-COSE JWT) can
          be fetched. In DID JSON-LD this is commonly emitted as an IRI node
          via did:serviceEndpoint rather than an xsd:anyURI literal.

  # Uses schema.org Organization vocabulary for interoperability.
  OrganizationEndpoint:
    class_uri: sdo:Organization
    attributes:
      name:
        description: A human-readable name for the organization.
        slot_uri: sdo:name
        range: string
      url:
        description: A URL associated with the organization.
        slot_uri: sdo:url
        range: uri
      description:
        description: A human-readable description of the organization.
        slot_uri: sdo:description
        range: string
      contactPoint:
        description: A contact point for the organization.
        slot_uri: sdo:contactPoint
        range: ContactPoint
        inlined: true

  ContactPoint:
    class_uri: sdo:ContactPoint
    slots:
      - contactType
    attributes:
      email:
        description: An email address.
        slot_uri: sdo:email
        range: string

  # Harbour-specific: CRSet revocation registry service endpoint.
  # [VCDM2] §4.10 — credentialStatus mechanisms are extensible. CRSet is a
  #   Harbour-defined mechanism (not BitstringStatusList or StatusList2021).
  CRSetRevocationRegistryService:
    class_uri: harbour:CRSetRevocationRegistryService
    slots:
      - serviceEndpoint
    slot_usage:
      serviceEndpoint:
        range: CRSetServiceEndpoint
        inlined: true

  CRSetServiceEndpoint:
    class_uri: harbour:CRSetServiceEndpoint
    slots:
      - registryEndpoint
      - statusPurpose
      - contractURN
      - sourceRepository
      - implementation

  # ==========================================
  # 3. CREDENTIAL TYPES
  # ==========================================
  # [VCDM2] §4 — VerifiableCredential MUST have @context, type,
  #   credentialSubject, issuer. MAY have id, validFrom, validUntil,
  #   credentialStatus, evidence, credentialSchema, relatedResource, etc.
  # Harbour credential types add mandatory credentialStatus (CRSetEntry)
  # and optional evidence to W3C VerifiableCredential.
  # [VC-JOSE-COSE] §3.1.1 — full VC JSON-LD becomes JWT payload (no vc wrapper).
  # [SD-JWT-VC] §11 — SD-JWT-VC does NOT use W3C VCDM; flat claims.
  #   Harbour claim_mapping.py bridges W3C ↔ SD-JWT-VC formats.

  HarbourCredential:
    abstract: true
    description: >
      Abstract base for all Harbour credentials. Requires issuer, validFrom,
      and credentialStatus with at least one CRSetEntry for revocation support.
    class_uri: harbour:HarbourCredential
    slots:
      - issuer
      - validFrom
      - validUntil
      - credentialSubject
      - evidence
      - credentialStatus
    slot_usage:
      # Harbour profile constraints on W3C VC envelope terms:
      # Stricter than base VCDM2 — issuer and validFrom are REQUIRED.
      issuer:
        required: true
        description: DID of the credential issuer.
      validFrom:
        required: true
        description: >
          VCDM2 §4.9 — Harbour profile: REQUIRED (stricter than base spec).
          SD-JWT-VC maps to iat (OPTIONAL) or nbf (OPTIONAL).
      validUntil:
        required: false
      credentialSubject:
        range: Any
        required: false
      evidence:
        range: Evidence
        required: false
      # Harbour profile: credentialStatus REQUIRED with CRSetEntry range.
      credentialStatus:
        range: CRSetEntry
        required: true
        description: Status entries for revocation checking (CRSet).

  VerifiableCredential:
    is_a: HarbourCredential
    description: >
      Concrete credential type at the core layer. Validates only the
      Harbour envelope constraints (issuer, validFrom, credentialStatus).
      No domain-specific credentialSubject requirements — any subject is
      valid. Domain layers (e.g. harbour-gx-credential) define specialized
      credential types with typed subjects.
    class_uri: harbour:VerifiableCredential
    annotations:
      vct: "https://w3id.org/reachhaven/harbour/credentials/v1/VerifiableCredential"

  # ==========================================
  # 3b. PRESENTATION TYPES
  # ==========================================
  # [VCDM2] §6 — A verifiable presentation is a tamper-evident presentation
  #   of one or more verifiable credentials. Contains holder, type, and
  #   verifiableCredential. Secured via VC-JOSE-COSE (vp+jwt) or SD-JWT VP.

  HarbourPresentation:
    abstract: true
    description: >
      Abstract base for all Harbour presentations. Requires holder and
      at least one verifiableCredential. On the wire, presentations are
      encoded as VC-JOSE-COSE compact JWS (typ: vp+jwt) or SD-JWT VP.
    class_uri: harbour:HarbourPresentation
    slots:
      - holder
      - verifiableCredential
    slot_usage:
      holder:
        required: true
        description: DID of the entity presenting the credentials.
      verifiableCredential:
        range: Any
        required: true
        description: >
          One or more verifiable credentials being presented. On the wire
          each entry is a compact JWS string (vc+jwt) or SD-JWT-VC token.

  VerifiablePresentation:
    is_a: HarbourPresentation
    description: >
      Concrete presentation type at the core layer. Wraps one or more
      harbour:VerifiableCredential instances for transmission. Evidence
      VPs embedded in credentials use this type. Domain layers may define
      specialized presentation types if needed.
    class_uri: harbour:VerifiablePresentation
    annotations:
      vpt: "https://w3id.org/reachhaven/harbour/credentials/v1/VerifiablePresentation"

  # ==========================================
  # 4. EVIDENCE TYPES
  # ==========================================
  # [VCDM2] §5.6 — evidence is OPTIONAL (0..*), each object MUST have type.
  #   No specific evidence subtypes are defined by the base spec.
  Evidence:
    abstract: true
    class_uri: harbour:Evidence

  # Harbour-specific evidence type for authorization proof during issuance.
  # [VCDM2] §5.6 — evidence can contain any claims (extensible).
  # [VC-JOSE-COSE] §6.1 — embedded VP is application/vp+jwt or application/vp+sd-jwt.
  CredentialEvidence:
    is_a: Evidence
    description: >
      Evidence that an authorizing party approved the credential issuance
      via OID4VP. The embedded VP carries the authorization proof:
      (1) For LegalPersonCredential: the Trust Anchor presents a VP
          containing its self-signed LegalPersonCredential, authorizing
          the Signing Service to issue a credential for the organization.
      (2) For NaturalPersonCredential: the organization presents a VP
          containing its own LegalPersonCredential (SD-JWT with sensitive
          fields redacted), authorizing the Signing Service to issue a
          credential for the employee.
      The Signing Service is the sole issuer of all credentials;
      evidence VPs establish the chain of authorization.
    class_uri: harbour:CredentialEvidence
    slots:
      - verifiablePresentation
    slot_usage:
      verifiablePresentation:
        required: true

  # Harbour-specific evidence type for delegated signing flows.
  # [OID4VP] §5.1, §8.4 — transaction_data in authorization request.
  # [OID4VP] §B.3.3 — KB-JWT carries transaction_data_hashes + _alg.
  # [CSC-DM] v1.0.0 — signatureRequest triggers OID4VP flow.
  # Harbour Delegation Spec §3 — challenge = "<nonce> HARBOUR_DELEGATE <hash>".
  #   transaction_data contains type, credential_ids, nonce, iat, txn.
  # [OID4VP] §B.1.3.2.5 — Data Integrity proof.challenge = OID4VP nonce;
  #   proof.domain = OID4VP client_id. KB-JWT equivalent: nonce = nonce, aud = client_id.
  DelegatedSignatureEvidence:
    is_a: Evidence
    description: >
      Evidence on a receipt credential (SD-JWT-VC) that a signing service
      executed a transaction with the user's explicit consent. The consent VP
      uses SD-JWT with PII redacted. Transaction data is a disclosable claim
      enabling three-layer privacy (public / authorized / full audit).
    class_uri: harbour:DelegatedSignatureEvidence
    slots:
      - verifiablePresentation
      - delegatedTo
      - transaction_data
      - challenge
    slot_usage:
      verifiablePresentation:
        required: true
      delegatedTo:
        required: true
      transaction_data:
        required: true
      challenge:
        required: true

  # [VCDM2] §4.10 — credentialStatus entries MUST have id and type.
  #   CRSet is a Harbour-defined status type (not BitstringStatusListEntry).
  # [SD-JWT-VC] §3.2 — "status" claim uses status_list sub-object (idx + uri).
  CRSetEntry:
    class_uri: harbour:CRSetEntry
    slots:
      - statusPurpose

  # ==========================================
  # 5. CREDENTIAL SUBJECT TYPES
  # ==========================================
  # Typed credentialSubject classes for domain-specific credentials.
  # Domain layers (gx, simpulseid) define participant-based subjects;
  # core defines receipt/transaction subjects.

  TransactionReceipt:
    description: >
      Credential subject for a delegated signing receipt.
      Records the blockchain transaction hash and ID for audit.
    class_uri: harbour:TransactionReceipt
    attributes:
      transactionHash:
        description: SHA-256 hash of the canonical transaction data.
        slot_uri: harbour:transactionHash
        range: string
      blockchainTxId:
        description: On-chain transaction identifier.
        slot_uri: harbour:blockchainTxId
        range: string

  # ==========================================
  # 6. HELPERS
  # ==========================================
  # [DID-CORE] §5.3.1 — verificationMethod MUST have id, type, controller,
  #   and key material (publicKeyJwk or publicKeyMultibase). Harbour models a
  #   subset; blockchainAccountId is a Harbour extension for on-chain binding.
  # [VC-JOSE-COSE] §4.2 — verification method type MUST be JsonWebKey; key
  #   material MUST be in publicKeyJwk property.
  VerificationMethod:
    class_uri: didcore:VerificationMethod
    slots:
      - controller
    attributes:
      blockchainAccountId:
        slot_uri: harbour:blockchainAccountId
        range: string

  JsonWebKey:
    is_a: VerificationMethod
    class_uri: sec:JsonWebKey
    description: >
      [VC-JOSE-COSE] §4.2 — verification method encoded as a JSON Web Key.
      The Harbour and SimpulseID did:ethr examples use this concrete method
      type for local P-256 controller and delegate keys.
    slots:
      - publicKeyJwk
    slot_usage:
      publicKeyJwk:
        required: true
        description: >
          [DID-CORE] §5.3.1 — key material for this verification method in
          JSON Web Key form.
