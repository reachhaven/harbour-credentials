id: https://www.w3.org/2018/credentials
name: w3c-vc
description: >
  LinkML projection of W3C Verifiable Credentials Data Model v2.0 vocabulary
  terms. Defines the VC envelope properties (issuer, validFrom, validUntil,
  evidence, credentialStatus) so they can be imported and constrained by
  downstream schemas via slot_usage without redefining them.
  The JSON-LD context for these terms is provided by the W3C VC v2 context
  (https://www.w3.org/ns/credentials/v2), NOT by this schema.

# ============================================================================
# SPECIFICATION REFERENCES
# ============================================================================
# [VCDM2]     W3C Verifiable Credentials Data Model v2.0
#             https://www.w3.org/TR/vc-data-model-2.0/
# [VC-CTX]    W3C VC v2 JSON-LD Context
#             https://www.w3.org/ns/credentials/v2
#
# DESIGN DECISION: Why this LinkML shim file exists
# ============================================================================
# LinkML cannot import external OWL ontologies or JSON-LD contexts directly.
# The imports: directive only accepts other LinkML schemas or linkml:types.
# This was confirmed by LinkML issue #1950 (External Namespace Support) which
# was CLOSED — wrapping external terms in a thin LinkML schema is the
# officially recommended pattern.
#   https://github.com/linkml/linkml/issues/1950
#
# This schema is intentionally minimal:
# - All constraints are LOOSE (matching the base W3C spec optionality)
# - Downstream schemas (e.g. harbour-core-credential.yaml) refine constraints
#   via slot_usage to create stricter profiles
# - default_prefix: cred — schema ID matches the external vocabulary namespace
# ============================================================================

prefixes:
  linkml: https://w3id.org/linkml/
  cred: https://www.w3.org/2018/credentials#
  cs: https://www.w3.org/ns/credentials/status#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: cred
default_range: string

imports:
  - linkml:types

slots:
  # [VCDM2] §4.7 — A verifiable credential MUST have an issuer property.
  # The value MUST be either a URL or an object containing an id property
  # whose value is a URL. Modeled as range: string here because LinkML has
  # no native IRI type; the SHACL generator is patched downstream to emit
  # sh:nodeKind sh:IRIOrLiteral (see HarbourShaclGenerator).
  issuer:
    slot_uri: cred:issuer
    range: string
    description: >
      [VCDM2] §4.7 — issuer MUST exist; value MUST be a URL or object with id.

  # [VCDM2] §4.9 — If present, the value of validFrom MUST be an
  # xsd:dateTimeStamp string value representing the date and time the
  # credential becomes valid.
  validFrom:
    slot_uri: cred:validFrom
    range: datetime
    description: >
      [VCDM2] §4.9 — validFrom is OPTIONAL, xsd:dateTime with mandatory
      timezone offset.

  # [VCDM2] §4.9 — If present, the value of validUntil MUST be an
  # xsd:dateTimeStamp string value representing the date and time the
  # credential ceases to be valid.
  validUntil:
    slot_uri: cred:validUntil
    range: datetime
    description: >
      [VCDM2] §4.9 — validUntil is OPTIONAL, xsd:dateTime.

  # [VCDM2] §5.6 — The evidence property provides information about the
  # process and/or evidence the issuer used when evaluating the claims
  # made in the credential. Each evidence object MUST specify its type.
  evidence:
    slot_uri: cred:evidence
    multivalued: true
    description: >
      [VCDM2] §5.6 — evidence is OPTIONAL (0..*), each object MUST have type.

  # [VCDM2] §4.10 — The credentialStatus property is OPTIONAL and is used
  # to discover information about the current status of a verifiable
  # credential (e.g. whether it is suspended or revoked). Each status
  # entry MUST specify its id and type.
  credentialStatus:
    slot_uri: cred:credentialStatus
    multivalued: true
    description: >
      [VCDM2] §4.10 — credentialStatus is OPTIONAL (0..*), each MUST have
      id and type.
